<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Showcase</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="background-glow"></div>

    <!-- Header Section: Fixed Logo and Title -->
    <header class="header">
        <img src="logo.png" alt="Logo" class="main-logo">
        <h1 class="app-title">آیه آموز</h1>
    </header>

    <main class="container">
        <!-- Description -->
        <section class="hero">
            <p class="description">
                The ultimate tool for modern creators. Manage, create, and deploy everything from one beautiful interface.
            </p>
            <!-- Action Section -->
            <div class="action-area">
                
                <!-- Direct APK Download (Active) -->
                <a href="ayeh_amooz_v1.1_published_by_ummatVahed.apk" class="btn btn-apk" download>
                    <i class="fas fa-download"></i>
                    <div class="btn-text">
                        <span>Download directly</span>
                        <strong>Android APK</strong>
                    </div>
                </a>

                <!-- App Store (Disabled) -->
                <div class="btn disabled">
                    <i class="fab fa-apple"></i>
                    <div class="btn-text">
                        <span>App Store</span>
                        <strong>Coming Soon</strong>
                    </div>
                    <span class="badge">Soon</span>
                </div>

                <!-- Google Play (Disabled) -->
                <div class="btn disabled">
                    <i class="fab fa-google-play"></i>
                    <div class="btn-text">
                        <span>Google Play</span>
                        <strong>Coming Soon</strong>
                    </div>
                    <span class="badge">Soon</span>
                </div>

            </div>
            <!-- Multiple Screenshots Section -->
            <div class="screenshot-grid">
                <div class="screen-card"><img src="Screenshot_1.png" alt="Screen 1"></div>
                <div class="screen-card"><img src="Screenshot_2.png" alt="Screen 1"></div>
                <div class="screen-card"><img src="Screenshot_3.png" alt="Screen 1"></div>
                <div class="screen-card"><img src="Screenshot_4.png" alt="Screen 1"></div>
                <div class="screen-card"><img src="Screenshot_5.png" alt="Screen 1"></div>
                <div class="screen-card"><img src="Screenshot_6.png" alt="Screen 1"></div>
            </div>
        </section>
    </main>

</body>
</html>
